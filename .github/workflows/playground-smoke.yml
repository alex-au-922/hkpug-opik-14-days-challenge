name: Playground smoke

on:
  workflow_dispatch:
    inputs:
      prompt_mode:
        description: Prompt used by the smoke run
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - weak-control

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out context-selection experiment
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          path: trusted
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Run seeded context-selection experiment
        working-directory: trusted/.github/tournament
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: >-
          uv run --frozen python scripts/run_context_selection_experiment.py
          --prompt-path ../../starter/prompt.example.txt

      - name: Upload scored experiment result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: context-selection-result
          path: trusted/.github/tournament/.local/playground/context-selection.json
          retention-days: 1
          if-no-files-found: error
