name: Playground smoke

on:
  workflow_dispatch:
    inputs:
      prompt_mode:
        description: Prompt used by the smoke run
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - weak-control

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out trusted playground code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Run real-model tournament proof
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          prompt_path="starter/prompt.example.txt"
          if [[ "${{ inputs.prompt_mode }}" == "weak-control" ]]; then
            prompt_path="starter/prompt.weak-control.txt"
          fi
          uv run --frozen python scripts/run_playground.py --prompt-path "$prompt_path"

      - name: Upload participant-safe result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playground-result
          path: .local/playground/run.json
          retention-days: 1
          if-no-files-found: error
