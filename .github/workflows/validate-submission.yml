name: Validate submission

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - submission/submission.zip

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validate-submission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate organizer ref
        env:
          ORGANIZER_REF: ${{ vars.ORGANIZER_REF }}
        run: |
          set -euo pipefail
          [[ "$ORGANIZER_REF" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out trusted base code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ vars.ORGANIZER_REF }}
          path: trusted
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Validate changed paths from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXPECTED_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > /tmp/pr.json
          test "$(jq -r .head.repo.full_name /tmp/pr.json)" = "$EXPECTED_HEAD_REPOSITORY"
          test "$(jq -r .head.sha /tmp/pr.json)" = "$EXPECTED_HEAD_SHA"
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" > /tmp/pr-files.json
          cd trusted/.github/tournament
          uv run --frozen python scripts/validate_pr_files.py --files-json /tmp/pr-files.json

      - name: Check out immutable participant files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: untrusted
          fetch-depth: 1
          persist-credentials: false
          sparse-checkout: |
            submission/submission.zip
          sparse-checkout-cone-mode: false

      - name: Validate encrypted submission envelope
        working-directory: trusted/.github/tournament
        run: >-
          uv run --frozen python scripts/validate_submission.py
          --submission-archive ../../../untrusted/submission/submission.zip
          --allowlist-path team_allowlist.json
          --tournament-ca-cert-path public_keys/tournament_ca_cert.pem
          --scorer-cert-path public_keys/scorer_cert.pem
